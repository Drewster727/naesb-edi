services:
  app:
    build: .
    ports: ["8000:8000"]
    env_file:
      - config/.env
    environment:
      NAESB_CONFIG_PATH: /app/config/config.yaml
      # overrides config/.env's NAESB_DATABASE_URL -- compose network uses the
      # service name "postgres" as the hostname, not localhost.
      NAESB_DATABASE_URL: postgresql://naesb:naesb@postgres:5432/naesb
    volumes:
      - ./config:/app/config:ro
      - gnupg_data:/data/gnupg
      - inbound_data:/data/inbound
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: ["python", "-m", "app.worker"]
    env_file:
      - config/.env
    environment:
      NAESB_CONFIG_PATH: /app/config/config.yaml
      NAESB_DATABASE_URL: postgresql://naesb:naesb@postgres:5432/naesb
    volumes:
      - ./config:/app/config:ro
      - gnupg_data:/data/gnupg
      - inbound_data:/data/inbound
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

  poller:
    build: .
    command: ["python", "-m", "app.poller"]
    env_file:
      - config/.env
    environment:
      NAESB_CONFIG_PATH: /app/config/config.yaml
      NAESB_DATABASE_URL: postgresql://naesb:naesb@postgres:5432/naesb
    volumes:
      - ./config:/app/config:ro
      - gnupg_data:/data/gnupg
      - outbound_data:/data/outbound
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: naesb
      POSTGRES_PASSWORD: naesb
      POSTGRES_DB: naesb
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naesb"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio_data:/data"]

volumes:
  gnupg_data:
  inbound_data:
  outbound_data:
  pg_data:
  minio_data:
