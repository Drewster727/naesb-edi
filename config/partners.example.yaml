partners:
  - name: acme-pipeline
    duns: "987654321"
    endpoint_url: "https://secure-transport.acme-pipeline.example.com/edi/receiver-endpoint"
    pgp_public_key_path: /data/gnupg/partners/acme-pipeline.pub.asc
    outbound_auth:
      type: basic          # HTTP Basic Authentication over TLS is a real NAESB requirement
      username: myuid       # (standards 12.3.14/12.3.28/12.3.29) -- this is the spec-compliant default.
      password_env: NAESB_ACME_PASSWORD
    inbound_auth:
      type: api_key   # NOTE: api_key/Bearer auth is a gateway-only extension, not a NAESB-defined
      key_env: NAESB_ACME_INBOUND_KEY   # scheme -- prefer `type: basic` unless this partner requires it.
    # envelope_overrides is optional -- only set fields that deviate from
    # config.yaml's envelope defaults for this specific Trading Partner
    # Agreement (TPA).
    envelope_overrides:
      version: "1.9"                 # override if this partner's TPA specifies a different Internet ET version
      agreed_transaction_sets: null  # e.g. ["NOM00001"] once the real 8-char code list is confirmed with this partner
      use_refnum: false              # set true if this partner uses refnum/refnum-orig message tracking
    # crypto_overrides is optional -- only set for a partner whose real
    # payloads/receipts use an algorithm outside config.yaml's
    # crypto.allowed_ciphers/allowed_digests default (e.g. a partner still
    # on 3DES), or whose on-file PGP key predates config.yaml's
    # crypto.min_rsa_key_bits floor (e.g. a legacy 1024-bit key) and can't be
    # rotated immediately -- min_rsa_key_bits below accepts that one
    # partner's key without lowering the floor enforced for everyone else.
    # Leave unset to use the global default.
    # crypto_overrides:
    #   allowed_ciphers: [AES256, AES192, AES128, 3DES]
    #   allowed_digests: [SHA256, SHA1]
    #   min_rsa_key_bits: 1024
    # require_signature defaults true. Set false only for a partner with a
    # documented, accepted gap -- e.g. their real system doesn't actually
    # PGP-sign outbound messages despite a TPA nominally calling for it.
    # Transport-level auth (inbound_auth above) still authenticates the
    # sender; this only stops enforcing the PGP-level signature/digest check
    # on the payload.
    require_signature: true
