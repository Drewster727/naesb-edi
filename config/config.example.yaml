identity:
  name: "MyCompany"
  duns: "123456789"

server:
  host: 0.0.0.0
  # NAESB Appendix C restricts Internet ET to a specific TCP port list
  # (443, 5713, 6112, 6304, 6874, 7403, or a mutually agreed alternate).
  # Whatever sits in front of this app (reverse proxy / load balancer) must
  # terminate TLS on one of those ports, or on a port mutually agreed with
  # each partner via the TPW.
  port: 8000
  inbound_path: /inbound
  max_body_size_bytes: 26214400
  outbound_source_address: null   # optional: bind egress to a specific static IP

crypto:
  private_key_path: /data/gnupg/private_key.asc
  passphrase_env: NAESB_GPG_PASSPHRASE
  gnupg_home: /data/gnupg
  min_rsa_key_bits: 2048          # real NAESB requirement (Appendix A)
  recommended_rsa_key_bits: 4096  # real NAESB recommendation (Appendix A)
  cipher_algo: AES256             # this gateway's own local security policy -- not a NAESB mandate
  digest_algo: SHA256             # this gateway's own local security policy -- not a NAESB mandate
  compress_algo: ZIP
  tls_min_version: "1.2"
  # Accept-list for algorithms seen in *inbound* decrypted messages and in
  # partner receipt signatures -- distinct from cipher_algo/digest_algo
  # above (what we use when we encrypt/sign). Broader than our own default
  # on purpose: NAESB doesn't mandate a specific cipher/digest (standard
  # 12.3.26), and real trading partners' PGP libraries are often older
  # (SHA1 signatures are still common). A partner needing something outside
  # this list (e.g. 3DES) should get a `crypto_overrides` entry in
  # partners.yaml rather than widening this default for everyone.
  allowed_ciphers: [AES256, AES192, AES128]
  allowed_digests: [SHA256, SHA384, SHA512, SHA1]

envelope:
  # This gateway's `server-id` receipt field: domainname or
  # hostname.domainname, no embedded spaces.
  server_id: gateway.mycompany.example.com
  # REQUIRED, no safe default: the NAESB Internet ET *protocol* version
  # (data dictionary `version` field -- historically a small decimal like
  # "1.9", not this manual's "4.0" revision number). Confirm the correct
  # value with each Trading Partner Agreement before going live; override
  # per-partner via partners.yaml's envelope_overrides.version if needed.
  default_version: "1.9"
  receipt_security_selection: "signed-receipt-protocol=required,pgp-signature;signed-receipt-micalg=required,sha256"

sinks:
  require_at_least_one_durable_success: true
  filesystem:
    enabled: true
    durable: true
    base_dir: /data/inbound
  s3:
    enabled: false
    durable: true
    endpoint_url: null          # set for MinIO/Wasabi; omit for AWS
    bucket: naesb-inbound
    prefix: ""
    region: us-east-1
    access_key_env: NAESB_S3_ACCESS_KEY
    secret_key_env: NAESB_S3_SECRET_KEY
  webhook:
    enabled: false
    durable: false
    url: null
    timeout_seconds: 10

database:
  url_env: NAESB_DATABASE_URL
  # Optional: only needed if you want the username/password kept separate
  # from the base connection string (e.g. rotated independently via a
  # secrets manager). If set, these override any credentials embedded in
  # the url_env value above.
  # username_env: NAESB_DATABASE_USERNAME
  # password_env: NAESB_DATABASE_PASSWORD

# Basic auth protecting internal-only endpoints (GET /api/partners,
# POST /outbound/send, GET /outbound/jobs/{id}). Distinct from any partner's
# inbound_auth/outbound_auth in partners.yaml.
internal_api:
  username_env: NAESB_INTERNAL_API_USERNAME
  password_env: NAESB_INTERNAL_API_PASSWORD

outbound:
  timeout_seconds: 30
  # Delay (seconds from job creation) of each delivery attempt; length of
  # this list is the max attempt count. NAESB standards 12.3.10/12.3.11
  # require 3 attempts, declaring an "Exchange Failure" if the gap between
  # the first and last attempt exceeds 30-120 minutes. Default below:
  # T+0 / +15min / +45min.
  retry_schedule_seconds: [0, 900, 2700]
  worker_poll_interval_seconds: 15

# File-drop outbound entry point (app/poller.py, the `poller` service in
# docker-compose.yml). Watches base_dir/<partner-duns>/ for raw, unencrypted
# EDI files, encrypts + enqueues each one exactly like POST /outbound/send
# does, then moves the file to base_dir/<duns>/processed/ once it's been
# handed to outbound_jobs -- NOT once it's actually delivered. Delivery
# outcome (including Exchange Failure after the usual 3 attempts) is only
# ever visible via GET /outbound/jobs/{id} and logs, never the filesystem.
# A file that fails before reaching the queue (unreadable, bad partner
# crypto config, DB unavailable) is retried up to max_pickup_attempts times
# before moving to base_dir/<duns>/error/.
poller:
  enabled: false
  base_dir: /data/outbound
  poll_interval_seconds: 15
  quiet_period_seconds: 60   # a file must be unmodified this long before it's picked up
  max_pickup_attempts: 3

logging:
  level: INFO   # DEBUG | INFO | WARNING | ERROR | CRITICAL
  format: json  # json | console
  # Logs the complete raw inbound HTTP request (method, path, headers with
  # Authorization redacted, and the full body) for every call to the inbound
  # endpoint, before any auth/parsing/decryption -- so a partner's request
  # can be inspected even if it fails before we can make sense of it.
  # Logged at INFO, so `level` above still applies (e.g. level: WARNING
  # suppresses this regardless of the flag).
  capture_raw_requests: true
  # directory: /app/logs  # uncomment to also persist rotating log files to disk (in addition to stdout)

partners_file: /app/config/partners.yaml
